name: Realtime Pipeline

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: # manual trigger

jobs:
  run-realtime-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements_pipeline.txt

      - name: Download reference data from HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          from pathlib import Path

          api = HfApi(token="${{ secrets.HF_TOKEN }}")
          repo_id = "bachirij/energy-intelligence-platform"

          # Download featured 2024 (drift reference)
          api.hf_hub_download(
              repo_id=repo_id,
              repo_type="space",
              filename="data/featured/country=FR/year=2024/load_forecasting_features.parquet",
              local_dir=".",
          )

          # Download model (used by monitoring)
          api.hf_hub_download(
              repo_id=repo_id,
              repo_type="space",
              filename="models/best_model.pkl",
              local_dir=".",
          )
          EOF

      - name: Run realtime pipeline
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
        run: python main.py --steps realtime

      - name: Upload updated data to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import shutil, tempfile
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token="${{ secrets.HF_TOKEN }}")
          repo_id = "bachirij/energy-intelligence-platform"

          monitoring_dir = Path("data/monitoring")
          latest = sorted(monitoring_dir.glob("*.json"))[-1]

          with tempfile.TemporaryDirectory() as tmp:
              tmp = Path(tmp)

              dest_rt = tmp / "data/realtime/country=FR"
              dest_rt.mkdir(parents=True)
              shutil.copy("data/realtime/country=FR/realtime.parquet", dest_rt)

              dest_mon = tmp / "data/monitoring"
              dest_mon.mkdir(parents=True)
              shutil.copy(latest, dest_mon)

              api.upload_folder(
                  folder_path=str(tmp),
                  repo_id=repo_id,
                  repo_type="space",
                  commit_message="chore: update realtime snapshot and monitoring report",
              )

          print("Done.")
          EOF
